# Jekyll configuration for sebs.github.io
# Built and deployed via GitHub Actions (.github/workflows/deploy.yml) so the
# dev.to writing feed can be fetched at build time. The legacy Hexo posts now
# live as markdown in _posts/ (each pins its original /YYYY/MM/DD/... permalink
# via front matter, so every existing URL still resolves), and the tag/date
# archives are regenerated by jekyll-archives.

title: "Sebastian Schürmann"
tagline: "TypeScript & Python developer · Open-source maintainer · Developer tooling"
description: >-
  Personal hub of Sebastian Schürmann: TypeScript & Python developer,
  open-source maintainer, and builder of developer tooling and LLM/AI workflows.
  Based in Hamburg.
author: "Sebastian Schürmann"
url: "https://sebs.github.io"
baseurl: ""
lang: "en"

# Default OG/Twitter image (relative to url)
image: "/assets/og/og-default.png"

plugins:
  - jekyll-sitemap
  - jekyll-archives

# Per-collection defaults: every post gets the post layout, the "writing" nav
# highlight, and article OG type without repeating it in each file's front matter.
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      nav: writing
      og_type: article

# Regenerate the writing listings from the markdown posts, reusing the original
# Hexo URLs so existing links keep working:
#   /tags/:name/   (e.g. /tags/typescript/)
#   /archives/:year/  and  /archives/:year/:month/
# The top-level /archives/ index is a hand-written page (archives.html).
jekyll-archives:
  enabled: [tags, year, month]
  layouts:
    tag: archive
    year: archive
    month: archive
  permalinks:
    tag: "/tags/:name/"
    year: "/archives/:year/"
    month: "/archives/:year/:month/"

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md
  - scripts
  - .github

# Faithful, fast output.
sass:
  style: compressed
